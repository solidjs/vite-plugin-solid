packages:
  - .
  - examples/*

allowBuilds:
  cypress: true
  esbuild: true
  msw: true

catalog:
  solid-js: ">=2.0.0-beta.18 <2.0.0-experimental.0"
  "@solidjs/web": ">=2.0.0-beta.18 <2.0.0-experimental.0"

ignoredBuiltDependencies:
  - cypress

minimumReleaseAgeExclude:
  - '@solidjs/signals@2.0.0-beta.18'
  - '@solidjs/web@2.0.0-beta.18'
  - babel-preset-solid@2.0.0-beta.18
  - solid-js@2.0.0-beta.18
  - '@dom-expressions/babel-plugin-jsx@0.50.0-next.21'
  - '@dom-expressions/jsx-compiler-darwin-arm64@0.50.0-next.21'
  - '@dom-expressions/jsx-compiler-darwin-x64@0.50.0-next.21'
  - '@dom-expressions/jsx-compiler-linux-arm64-gnu@0.50.0-next.21'
  - '@dom-expressions/jsx-compiler-linux-x64-gnu@0.50.0-next.21'
  - '@dom-expressions/jsx-compiler-win32-x64-msvc@0.50.0-next.21'
  - '@dom-expressions/jsx-compiler-wasm32-wasi@0.50.0-next.21'
  - '@dom-expressions/jsx-compiler@0.50.0-next.21'

onlyBuiltDependencies:
  - cypress
  - esbuild
  - msw
