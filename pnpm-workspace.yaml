packages:
  - .
  - examples/*

allowBuilds:
  cypress: true
  esbuild: true
  msw: true

catalog:
  solid-js: ">=2.0.0-beta.22 <2.0.0-experimental.0"
  "@solidjs/web": ">=2.0.0-beta.22 <2.0.0-experimental.0"

ignoredBuiltDependencies:
  - cypress

minimumReleaseAgeExclude:
  - '@solidjs/signals@2.0.0-beta.22'
  - '@solidjs/web@2.0.0-beta.22'
  - babel-preset-solid@2.0.0-beta.22
  - solid-js@2.0.0-beta.22
  - '@dom-expressions/babel-plugin-jsx@0.50.0-next.25'
  - '@dom-expressions/compiler-darwin-arm64@0.50.0-next.25'
  - '@dom-expressions/compiler-darwin-x64@0.50.0-next.25'
  - '@dom-expressions/compiler-linux-arm64-gnu@0.50.0-next.25'
  - '@dom-expressions/compiler-linux-x64-gnu@0.50.0-next.25'
  - '@dom-expressions/compiler-win32-x64-msvc@0.50.0-next.25'
  - '@dom-expressions/compiler-wasm32-wasi@0.50.0-next.25'
  - '@dom-expressions/compiler@0.50.0-next.25'

onlyBuiltDependencies:
  - cypress
  - esbuild
  - msw
